<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Toolbox — 创意工具箱</title>
  <link rel="icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/shared/layout.css" />
  <style>
    /* === Body Background === */
    body {
      background:
        /* dot grid */
        radial-gradient(circle, var(--border) 1px, transparent 1px),
        /* gradient wash */
        linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--primary) 8%, var(--bg)) 50%, var(--bg) 100%),
        var(--bg);
      background-size: 24px 24px, 100% 100%, auto;
      background-position: 0 0;
    }

    [data-theme="light"] body {
      background:
        radial-gradient(circle, #e5e7eb 1px, transparent 1px),
        linear-gradient(180deg, #fafafa 0%, #f3f0ff 50%, #fafafa 100%),
        #fafafa;
      background-size: 24px 24px, 100% 100%, auto;
    }

    .page-wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 60px 24px 80px;
      position: relative;
      z-index: 1;
    }

    /* === Floating Orbs — bigger, more visible === */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    .bg-orb.orb-1 {
      width: 600px; height: 600px;
      background: var(--primary);
      top: -200px; right: -150px;
      animation: floatA 14s ease-in-out infinite;
    }
    .bg-orb.orb-2 {
      width: 500px; height: 500px;
      background: var(--accent);
      bottom: -150px; left: -120px;
      animation: floatB 17s ease-in-out infinite;
    }
    .bg-orb.orb-3 {
      width: 350px; height: 350px;
      background: #ff6b9d;
      top: 55%; left: 45%;
      animation: floatC 11s ease-in-out infinite;
    }

    @keyframes floatA {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-50px, 60px) scale(1.15); }
      66% { transform: translate(30px, -30px) scale(0.9); }
    }
    @keyframes floatB {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -40px) scale(1.2); }
      66% { transform: translate(-30px, 20px) scale(0.85); }
    }
    @keyframes floatC {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.25); }
    }

    /* === Hero === */
    .hero {
      text-align: center;
      margin-bottom: 64px;
      position: relative;
    }

    .hero-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      background: color-mix(in srgb, var(--primary) 20%, transparent);
      color: var(--primary);
      border: 1px solid color-mix(in srgb, var(--primary) 35%, transparent);
      margin-bottom: 24px;
      letter-spacing: 0.5px;
      backdrop-filter: blur(10px);
    }

    .hero h1 {
      font-size: clamp(44px, 8vw, 68px);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 50%, #ff6b9d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1.5px;
      filter: drop-shadow(0 0 30px color-mix(in srgb, var(--primary) 30%, transparent));
    }

    .hero p {
      color: var(--text-secondary);
      font-size: 18px;
      max-width: 500px;
      margin: 0 auto 32px;
      line-height: 1.7;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 48px;
      flex-wrap: wrap;
    }
    .hero-stat {
      text-align: center;
    }
    .hero-stat .num {
      font-size: 30px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-stat .label {
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 1px;
      margin-top: 4px;
      text-transform: uppercase;
    }

    /* === Tool Cards === */
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }

    .tool-card {
      position: relative;
      background: color-mix(in srgb, var(--card-bg) 80%, transparent);
      border: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
      border-radius: 20px;
      padding: 44px 36px 36px;
      text-align: center;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      text-decoration: none;
      display: block;
      color: inherit;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* Card glow on hover */
    .tool-card::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 22px;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .card-pixel::after {
      background: linear-gradient(135deg, var(--primary), transparent 60%);
    }
    .card-word::after {
      background: linear-gradient(135deg, var(--accent), transparent 60%);
    }
    .tool-card:hover::after {
      opacity: 0.4;
    }

    .tool-card:hover {
      transform: translateY(-8px);
      border-color: color-mix(in srgb, var(--primary) 60%, transparent);
      box-shadow:
        0 24px 80px rgba(124, 58, 237, 0.15),
        0 0 0 1px color-mix(in srgb, var(--primary) 40%, transparent);
    }

    [data-theme="light"] .tool-card:hover {
      box-shadow:
        0 24px 80px rgba(124, 58, 237, 0.1),
        0 0 0 1px color-mix(in srgb, var(--primary) 25%, transparent);
    }

    .tool-card > * {
      position: relative;
      z-index: 1;
    }

    .tool-card .icon-wrap {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 44px;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      position: relative;
    }

    .card-pixel .icon-wrap {
      background: linear-gradient(135deg, color-mix(in srgb, var(--primary) 25%, transparent), color-mix(in srgb, var(--primary) 10%, transparent));
      box-shadow: 0 8px 32px color-mix(in srgb, var(--primary) 20%, transparent);
    }
    .card-word .icon-wrap {
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 25%, transparent), color-mix(in srgb, var(--accent) 10%, transparent));
      box-shadow: 0 8px 32px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .tool-card:hover .icon-wrap {
      transform: scale(1.08) rotate(-5deg);
    }
    .card-pixel:hover .icon-wrap {
      box-shadow: 0 12px 40px color-mix(in srgb, var(--primary) 35%, transparent);
    }
    .card-word:hover .icon-wrap {
      box-shadow: 0 12px 40px color-mix(in srgb, var(--accent) 35%, transparent);
    }

    .tool-card h3 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .tool-card p {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .tool-card .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .tool-card .feature-tag {
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      background: color-mix(in srgb, var(--primary) 12%, transparent);
      color: var(--text-secondary);
      border: 1px solid color-mix(in srgb, var(--primary) 20%, transparent);
    }

    .tool-card .btn {
      padding: 12px 32px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .card-pixel .btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: #fff;
      box-shadow: 0 4px 20px color-mix(in srgb, var(--primary) 35%, transparent);
    }
    .card-pixel .btn:hover {
      box-shadow: 0 6px 28px color-mix(in srgb, var(--primary) 50%, transparent);
      transform: translateY(-1px);
    }
    .card-word .btn {
      background: linear-gradient(135deg, var(--accent), #05b88a);
      color: #000;
      box-shadow: 0 4px 20px color-mix(in srgb, var(--accent) 35%, transparent);
    }
    .card-word .btn:hover {
      box-shadow: 0 6px 28px color-mix(in srgb, var(--accent) 50%, transparent);
      transform: translateY(-1px);
    }

    /* === Footer === */
    .site-footer {
      text-align: center;
      padding: 40px 24px;
      color: var(--text-secondary);
      font-size: 13px;
      border-top: 1px solid color-mix(in srgb, var(--border) 40%, transparent);
      position: relative;
      z-index: 1;
    }
    .site-footer a {
      color: var(--primary);
      text-decoration: none;
    }
    .site-footer a:hover {
      text-decoration: underline;
    }

    /* === Responsive === */
    @media (max-width: 720px) {
      .hero h1 { font-size: 38px; }
      .hero-stats { gap: 28px; }
      .tool-card { padding: 32px 24px 28px; }
      .tool-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <template id="shared-nav-template">
    <nav class="shared-nav">
      <a href="/" class="logo">🎨 Creative Toolbox</a>
      <div class="nav-links">
        <a href="/tools/pixel-art/">像素画板</a>
        <a href="/tools/word-cloud/">文字云</a>
      </div>
      <button class="theme-toggle" id="theme-toggle" title="切换主题">🌙</button>
    </nav>
  </template>

  <main class="page-wrap">
    <section class="hero">
      <div class="hero-badge">✨ 免费开源 · 浏览器即用</div>
      <h1>创意工具箱</h1>
      <p>随手可用的轻量创意工具集，无需安装，打开浏览器就能开始创作</p>
      <div class="hero-stats">
        <div class="hero-stat"><div class="num">2</div><div class="label">创意工具</div></div>
        <div class="hero-stat"><div class="num">2</div><div class="label">导出格式</div></div>
        <div class="hero-stat"><div class="num">∞</div><div class="label">创作可能</div></div>
      </div>
    </section>

    <section class="tool-grid">
      <a href="tools/pixel-art/" class="tool-card card-pixel">
        <div class="icon-wrap">🎨</div>
        <h3>像素画板</h3>
        <p>在网格画布上绘制像素艺术，多尺寸可选，一键导出高清 PNG</p>
        <div class="features">
          <span class="feature-tag">8×8 / 16×16 / 32×32</span>
          <span class="feature-tag">20 色预设</span>
          <span class="feature-tag">撤销重做</span>
          <span class="feature-tag">导出 PNG</span>
        </div>
        <span class="btn">打开工具 →</span>
      </a>

      <a href="tools/word-cloud/" class="tool-card card-word">
        <div class="icon-wrap">☁️</div>
        <h3>文字云生成器</h3>
        <p>输入文字自动生成漂亮词云，多种形状配色，支持矢量导出</p>
        <div class="features">
          <span class="feature-tag">中英双语</span>
          <span class="feature-tag">4 种形状</span>
          <span class="feature-tag">5 套配色</span>
          <span class="feature-tag">PNG + SVG</span>
        </div>
        <span class="btn">打开工具 →</span>
      </a>
    </section>
  </main>

  <footer class="site-footer">
    用 ❤️ 和 AI 搭建 · <a href="https://github.com/fuyule992-lang/creative-toolbox" target="_blank">GitHub</a>
  </footer>

  <script type="module" src="/shared/layout.js"></script>
</body>
</html>
